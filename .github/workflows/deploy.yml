name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "container/**"
      - "src/**"
      - "package*.json"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: nanoclaw-agent
  ECR_REGISTRY: 194428989522.dkr.ecr.ap-southeast-1.amazonaws.com
  INSTANCE_ID: i-08fb5c761c1d0f4d2

jobs:
  deploy:
    name: Build → ECR → EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::194428989522:role/nanoclaw-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: ./container
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest,${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to: type=inline

      - name: Deploy to EC2 via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 194428989522.dkr.ecr.ap-southeast-1.amazonaws.com",
              "docker pull 194428989522.dkr.ecr.ap-southeast-1.amazonaws.com/nanoclaw-agent:latest",
              "docker tag 194428989522.dkr.ecr.ap-southeast-1.amazonaws.com/nanoclaw-agent:latest nanoclaw-agent:latest",
              "systemctl restart nanoclaw",
              "echo DEPLOY_OK"
            ]' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command ID: $CMD_ID"

          # Poll until done (max 3 min)
          for i in $(seq 1 18); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            echo "[$i] Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "Deploy succeeded"
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" ]]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
          done
          echo "Timed out waiting for deploy"
          exit 1
